<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isabel Cuenca</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

        body {
        font-family: 'Trebuchet MS', sans-serif;
        background: #e5eced;
        color: #333;
        line-height: 1.6;
    }

    header {
        text-align: center;
        padding: 40px 20px;
        background: #d8f1f3;
        color: rgb(31, 43, 40);
    }

    header h1 {
        font-size: 3rem;
        margin-bottom: 10px;
    }

    header p {
        font-size: 1.1rem;
        color: #333;
    }

    section {
        max-width: 1200px;
        margin: 50px auto;
        padding: 0 20px;
    }

    section h2 {
        margin-bottom: 20px;
        font-size: 2rem;
        border-bottom: 3px solid #333;
        display: inline-block;
        padding-bottom: 5px;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 15px;
    }

    .gallery img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 8px;
        cursor: pointer;
        transition: transform 0.3s ease;
    }

    .gallery img:hover {
        transform: scale(1.05);
    }

    /* Lightbox */
    .lightbox {
        display: none;
        position: fixed;
        z-index: 9999;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.9);
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .lightbox img {
        max-width: 90%;
        max-height: 90%;
        border-radius: 10px;
    }

    .close {
        position: absolute;
        top: 20px;
        right: 30px;
        color: white;
        font-size: 40px;
        cursor: pointer;
    }

    @media (max-width: 768px) {
        header h1 {
            font-size: 2rem;
        }

        section h2 {
            font-size: 1.5rem;
        }
    }
</style>
</head>
<body>

<header>
    <h1>Isabel Cuenca</h1>
    <p>Paintings • Installations • Ceramics</p>
</header>

<!-- Paintings -->
<section>
    <h2>Paintings</h2>

    <div class="gallery">
        <img src="image/ICP01.jpg" alt="Painting 1" onclick="openLightbox(this.src)">
        <img src="image/ICP02.jpg" alt="Painting 2" onclick="openLightbox(this.src)">
        <img src="image/ICP03.jpg" alt="Painting 3" onclick="openLightbox(this.src)">
        <img src="image/ICP04.jpg" alt="Painting 4" onclick="openLightbox(this.src)">
        <img src="image/ICP05.jpg" alt="Painting 5" onclick="openLightbox(this.src)">
        <img src="image/ICP06.jpg" alt="Painting 6" onclick="openLightbox(this.src)">
        <img src="image/ICP07.jpg" alt="Painting 7" onclick="openLightbox(this.src)">
        <img src="image/ICP08.jpg" alt="Painting 8" onclick="openLightbox(this.src)">
        <img src="image/ICP09.jpg" alt="Painting 9" onclick="openLightbox(this.src)">
    </div>
</section>

<!-- Installations -->
<section>
    <h2>Installations</h2>

    <div class="gallery">
        <img src="/image/ICI01.jpg" alt="Installation 1" onclick="openLightbox(this.src)">
        <img src="/image/ICI02.jpg" alt="Installation 2" onclick="openLightbox(this.src)">
        <img src="/image/ICI03.jpg" alt="Installation 3" onclick="openLightbox(this.src)">
        <img src="/image/ICI04.jpg" alt="Installation 4" onclick="openLightbox(this.src)">
        <img src="/image/ICI05.jpg" alt="Installation 5" onclick="openLightbox(this.src)">
        <img src="/image/ICI06.jpg" alt="Installation 6" onclick="openLightbox(this.src)">
    </div>
</section>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>
    <img id="lightbox-img" src="" alt="">
</div>

<script>
function openLightbox(src) {
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightbox-img").src = src;
}

function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
}

// Close when clicking outside image
document.getElementById("lightbox").addEventListener("click", function(e) {
    if (e.target === this) {
        closeLightbox();
    }
});
</script>
<p style="font-size:15px; font-family: 'Trebuchet MS', sans-serif; color: rgb(152, 154, 156);text-align: center;"><i>Copyright Isabel Cuenca 2026</i></p>
</body>
</html>
